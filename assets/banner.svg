<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1722"/>
      <stop offset="100%" stop-color="#0f2030"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="80" x2="1280" y2="80" stroke="#1a2d3f" stroke-width="1"/>
  <line x1="0" y1="160" x2="1280" y2="160" stroke="#1a2d3f" stroke-width="1"/>
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#1a2d3f" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="320" stroke="#1a2d3f" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="320" stroke="#1a2d3f" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="320" stroke="#1a2d3f" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="320" fill="#36E0C8"/>

  <!-- Title -->
  <text x="60" y="128"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="80" font-weight="700" letter-spacing="-2" fill="#36E0C8" filter="url(#glow)">TokenGate</text>

  <!-- Tagline -->
  <text x="62" y="178"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="400" fill="#ffffff" opacity="0.92">Cut LLM API costs by 50&#x2013;90%. Change one line of code.</text>

  <!-- Sub-tagline -->
  <text x="62" y="220"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="17" fill="#8faabb">Five stacked layers &#x00B7; Full transparency &#x00B7; No silent quality degradation</text>

  <!-- RAIT attribution -->
  <text x="62" y="278"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="14" fill="#36E0C8" opacity="0.7">Built in Dublin by RAIT</text>

  <!-- Pipeline diagram — right side -->
  <!-- Connector lines -->
  <line x1="910" y1="160" x2="945" y2="160" stroke="#8faabb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="995" y1="160" x2="1030" y2="160" stroke="#8faabb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="1080" y1="160" x2="1115" y2="160" stroke="#8faabb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="1165" y1="160" x2="1200" y2="160" stroke="#8faabb" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Layer blocks -->
  <!-- L1 Exact -->
  <rect x="860" y="138" width="50" height="44" rx="6" fill="#1a3050" stroke="#36E0C8" stroke-width="1.5"/>
  <text x="885" y="157" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="600" fill="#36E0C8">L1</text>
  <text x="885" y="172" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="9" fill="#8faabb">Exact</text>

  <!-- L2 Semantic -->
  <rect x="945" y="138" width="50" height="44" rx="6" fill="#1a3050" stroke="#36E0C8" stroke-width="1.5"/>
  <text x="970" y="157" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="600" fill="#36E0C8">L2</text>
  <text x="970" y="172" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="9" fill="#8faabb">Semantic</text>

  <!-- Distiller -->
  <rect x="1030" y="138" width="50" height="44" rx="6" fill="#1a2d40" stroke="#8faabb" stroke-width="1.5"/>
  <text x="1055" y="157" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="9" font-weight="600" fill="#c0d0dc">Distil</text>
  <text x="1055" y="172" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="9" fill="#8faabb">-ler</text>

  <!-- Budgeter -->
  <rect x="1115" y="138" width="50" height="44" rx="6" fill="#1a2d40" stroke="#8faabb" stroke-width="1.5"/>
  <text x="1140" y="157" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="9" font-weight="600" fill="#c0d0dc">Budget</text>
  <text x="1140" y="172" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="9" fill="#8faabb">-er</text>

  <!-- Router -->
  <rect x="1200" y="138" width="54" height="44" rx="6" fill="#2a1a0a" stroke="#F97A2E" stroke-width="1.5"/>
  <text x="1227" y="157" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="9" font-weight="600" fill="#F97A2E">Cascade</text>
  <text x="1227" y="172" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="9" fill="#c08050">Router</text>

  <!-- "Your app" label -->
  <text x="840" y="133"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="10" fill="#8faabb" text-anchor="middle">Your App</text>
  <line x1="840" y1="136" x2="860" y2="160" stroke="#8faabb" stroke-width="1" opacity="0.5"/>
</svg>
